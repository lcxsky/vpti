<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>VPTI — VCT Player Type Indicator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080c14;
  --bg2: #0d1220;
  --panel: rgba(13,18,32,0.85);
  --red: #e83040;
  --red2: #ff5060;
  --gold: #f0b429;
  --ink1: #eef2ff;
  --ink2: #8892aa;
  --ink3: #4a5568;
  --stroke: rgba(255,255,255,0.07);
  --stroke2: rgba(255,255,255,0.14);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans SC',sans-serif;
  background:var(--bg);
  color:var(--ink1);
  min-height:100vh;
  overflow-x:hidden;
}

/* background grid */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(232,48,64,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(232,48,64,0.04) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
  z-index:0;
}

.glow{
  position:fixed;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(232,48,64,0.12) 0%,transparent 70%);
  top:-200px;left:-100px;
  pointer-events:none;z-index:0;
  animation:drift 12s ease-in-out infinite alternate;
}
@keyframes drift{from{transform:translate(0,0)}to{transform:translate(80px,60px)}}

main{position:relative;z-index:1;width:min(760px,94vw);margin:0 auto;padding:48px 0 80px}

/* header */
.hdr{text-align:center;margin-bottom:48px}
.hdr-label{
  display:inline-block;
  font-family:'Bebas Neue',sans-serif;
  font-size:12px;letter-spacing:4px;
  color:var(--red);
  border:1px solid rgba(232,48,64,0.4);
  padding:4px 14px;border-radius:2px;
  margin-bottom:16px;
}
.hdr h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(40px,7vw,72px);
  letter-spacing:3px;
  line-height:1;
  background:linear-gradient(160deg,#fff 30%,#8892aa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:14px;
}
.hdr p{color:var(--ink2);font-size:14px;line-height:1.7;max-width:520px;margin:0 auto}

/* card */
.card{
  background:var(--panel);
  border:1px solid var(--stroke2);
  border-radius:16px;
  padding:32px;
  backdrop-filter:blur(12px);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(232,48,64,0.6),transparent);
}

/* progress bar */
.prog-wrap{margin-bottom:28px}
.prog-text{
  display:flex;justify-content:space-between;
  font-size:12px;color:var(--ink2);letter-spacing:1px;
  margin-bottom:8px;
}
.prog-bar{height:2px;background:var(--stroke2);border-radius:2px;overflow:hidden}
.prog-fill{
  height:100%;background:linear-gradient(90deg,var(--red),var(--gold));
  border-radius:2px;transition:width .4s ease;
}

/* question */
.q-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:12px;letter-spacing:3px;color:var(--red);
  margin-bottom:8px;
}
.q-text{
  font-size:18px;font-weight:500;color:var(--ink1);
  line-height:1.6;margin-bottom:24px;
}

/* options */
.opts{display:grid;gap:10px;margin-bottom:28px}
.opt{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 16px;
  border-radius:10px;
  border:1px solid var(--stroke2);
  background:rgba(255,255,255,0.02);
  cursor:pointer;
  transition:border-color .2s,background .2s,transform .15s;
  user-select:none;
}
.opt:hover{border-color:rgba(232,48,64,0.4);background:rgba(232,48,64,0.04);transform:translateX(3px)}
.opt.sel{
  border-color:var(--red);
  background:rgba(232,48,64,0.08);
}
.opt-letter{
  flex-shrink:0;
  width:22px;height:22px;
  border-radius:4px;
  border:1px solid var(--stroke2);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:12px;
  color:var(--ink2);
  transition:border-color .2s,color .2s,background .2s;
  margin-top:1px;
}
.opt.sel .opt-letter{border-color:var(--red);color:var(--red);background:rgba(232,48,64,0.12)}
.opt-txt{font-size:14px;color:var(--ink1);line-height:1.6}

/* actions */
.acts{display:flex;gap:10px;flex-wrap:wrap}
.btn{
  padding:10px 22px;border-radius:8px;
  border:1px solid var(--stroke2);
  background:transparent;
  color:var(--ink2);font-size:14px;font-weight:500;
  font-family:'Noto Sans SC',sans-serif;
  cursor:pointer;
  transition:border-color .2s,color .2s,background .2s,transform .15s;
}
.btn:hover{border-color:var(--stroke2);color:var(--ink1);background:rgba(255,255,255,0.04);transform:translateY(-1px)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn.primary{
  background:linear-gradient(120deg,var(--red),#c0392b);
  border-color:transparent;color:#fff;
  box-shadow:0 4px 20px rgba(232,48,64,0.3);
}
.btn.primary:hover{box-shadow:0 6px 28px rgba(232,48,64,0.45)}

/* result */
.result{display:none;margin-top:32px;animation:fadeUp .5s ease}
.result.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.result-inner{
  border:1px solid rgba(232,48,64,0.3);
  border-radius:14px;
  overflow:hidden;
}
.result-top{
  background:linear-gradient(135deg,rgba(232,48,64,0.15),rgba(13,18,32,0.8));
  padding:28px 28px 24px;
  border-bottom:1px solid var(--stroke2);
  text-align:center;
}
.result-label{font-size:11px;letter-spacing:3px;color:var(--ink2);margin-bottom:12px;font-family:'Bebas Neue',sans-serif}
.result-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(44px,8vw,72px);
  letter-spacing:2px;
  background:linear-gradient(135deg,#fff,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1;
  margin-bottom:8px;
}
.result-match{
  font-size:13px;color:var(--ink2);
}
.result-match span{color:var(--gold);font-weight:700;font-size:18px}

.result-desc{
  margin-top:12px;
  font-size:13px;
  color:var(--ink2);
  line-height:1.7;
}

.result-bar-wrap{padding:20px 28px;border-bottom:1px solid var(--stroke);background:rgba(0,0,0,0.2)}
.result-bar-label{font-size:11px;letter-spacing:2px;color:var(--ink3);margin-bottom:6px;font-family:'Bebas Neue',sans-serif}
.result-bar-track{height:6px;background:var(--stroke2);border-radius:4px;overflow:hidden}
.result-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--red),var(--gold));transition:width 1s ease .2s}

.result-dims{
  display:grid;grid-template-columns:1fr 1fr;
  gap:1px;background:var(--stroke);
}
.dim-cell{
  background:var(--bg2);
  padding:14px 20px;
}
.dim-cell-label{font-size:11px;color:var(--ink3);letter-spacing:1px;margin-bottom:4px}
.dim-cell-val{font-size:13px;color:var(--ink2)}
.dim-cell-val b{color:var(--ink1);font-weight:500}

.result-footer{padding:16px 28px;text-align:center}
.result-footer p{font-size:12px;color:var(--ink3)}

.note{margin-top:24px;text-align:center;font-size:12px;color:var(--ink3)}

/* transition */
.q-wrap{transition:opacity .2s,transform .2s}
.q-wrap.fade-out{opacity:0;transform:translateX(-12px)}
</style>
</head>
<body>
<div class="glow"></div>
<main>
  <div class="hdr">
    <div class="hdr-label">VCT PLAYER TYPE INDICATOR</div>
    <h1>VPTI</h1>
    <p>25 道题，答完后匹配你最接近的 VCT 选手原型</p>
  </div>

  <div class="card">
    <div class="prog-wrap">
      <div class="prog-text">
        <span id="prog-txt">第 1 / 25 题</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div class="q-wrap" id="q-wrap">
      <div class="q-num" id="q-num">Q01</div>
      <div class="q-text" id="q-text"></div>
      <div class="opts" id="opts"></div>
    </div>

    <div class="acts">
      <button class="btn" id="prev-btn" disabled>上一题</button>
      <button class="btn primary" id="next-btn">下一题</button>
      <button class="btn" id="reset-btn">重新开始</button>
    </div>

    <div class="result" id="result">
      <div class="result-inner">
        <div class="result-top">
          <div class="result-label">YOUR PLAYER TYPE</div>
          <div class="result-name" id="res-name">—</div>
          <div class="result-match">匹配度 <span id="res-pct">—</span></div>
          <div class="result-desc" id="res-desc"></div>
        </div>
        <div class="result-bar-wrap">
          <div class="result-bar-label">MATCH SCORE</div>
          <div class="result-bar-track">
            <div class="result-bar-fill" id="res-bar" style="width:0%"></div>
          </div>
        </div>
        <div class="result-dims" id="res-dims"></div>
        <div class="result-footer"><p>仅供玩梗娱乐，不代表对选手的严肃评价</p></div>
      </div>
    </div>

    <div class="note">仅供娱乐，不适合作为严肃人物评价</div>
  </div>
</main>

<script>
// ── 题目 ──────────────────────────────────────────────────────────────
const QUESTIONS = [
  {id:1,dim:"E",text:"手枪局开局，你更像：",opts:["先稳默认，等信息，不急着做第一个露头的人","跟着队友拿空间，我负责补枪","只要机会对，我愿意做第一个探路的人","我就想第一个出去接，最好开局先狠狠干一波"]},
  {id:2,dim:"R",text:"你在 1v2 时，更接近哪种处理？",opts:["先保枪位/保信息，找最稳妥的赢法","稍微等等对面犯错","有机会就主动抢 timing","不等了，直接搏一波大的"]},
  {id:3,dim:"T",text:"指挥说\"这回合按默认来\"，但你手感很热，你会：",opts:["我不管，先自己找架再说","大体听，但有机会我会自己改计划","基本按队伍节奏来，除非机会特别大","完全按团队计划执行，手感热也不乱改"]},
  {id:4,dim:"M",text:"你最舒服的拿击杀方式是：",opts:["绕后、偷 timing、让对面不知道我在哪","靠信息差和站位抓人","中距离正面对枪拿下","直接抢第一枪位，硬解"]},
  {id:5,dim:"C",text:"1v1 剩 10 秒，你更像：",opts:["容易急，怕时间不够","大致冷静，但会加快节奏","能稳住思路，按信息走","越到这种时候越冷静，像开了残局脑"]},
  {id:6,dim:"E",text:"队里资源倾斜给你时，你更愿意：",opts:["让更适合的人先打，我做兜底","只在需要时顶上去","我可以拿资源开路，成不成看我第一波","资源给我就是让我开门的，我默认自己先出"]},
  {id:7,dim:"R",text:"连输几分后，你更容易：",opts:["更保守，先别继续犯错","稍微收一点，找回节奏","还是会找机会主动出击","越逆风越想狠狠干，赌一波把气势抢回来"]},
  {id:8,dim:"T",text:"指挥已经喊撤了，但你看到一个可能的单杀机会：",opts:["我大概率还是会去试","我会很纠结，但偏向去看一眼","如果收益不够大，我就撤","既然喊撤，就不贪这个镜头"]},
  {id:9,dim:"M",text:"进攻回合你最喜欢的展开方式：",opts:["单摸、绕侧、切后路","先控图，把对面拖乱","跟队友一起正面推进","爆弹冲点，正面强拆"]},
  {id:10,dim:"C",text:"赛点局/关键分，你的状态更像：",opts:["容易脑子发热","会紧张，但还能打","关键分通常能比平时更专注","压力越大越像机器"]},
  {id:11,dim:"E",text:"队友都在犹豫\"这波谁先开\"时，你通常会：",opts:["先等对面动，再决定","看队友谁位置更好","我来试着找第一接触","别磨叽，我先冲"]},
  {id:12,dim:"R",text:"经济差、武器劣势局，你更偏向：",opts:["尽量偷枪、保生存","先等队友创造机会","找一个大胆 timing 去翻","直接高风险前压，拼出奇迹"]},
  {id:13,dim:"T",text:"队友失误把局面送乱了，你通常会：",opts:["有点想自己接管，按自己的节奏打","嘴上不说，但会更多按自己想法来","先补漏洞，再试着把回合拉回团队轨道","优先救队伍结构，哪怕自己数据变难看"]},
  {id:14,dim:"M",text:"对面有个特别强的枪男一直卡你点，你更愿意：",opts:["换路，或者想办法避开他","用道具骗他位置","配合队友一起把他清掉","我就想跟他正面打一枪"]},
  {id:15,dim:"C",text:"今天手感很差时，你会：",opts:["更想硬拼一波把状态打回来","偶尔会急","先稳住，不让问题继续扩大","主动降风险，打最正确的回合"]},
  {id:16,dim:"S",text:"朋友聚会拍合照时，你一般：",opts:["能躲边上就躲边上","随便站，别太显眼就行","会找个比较好看的位置","我默认自己得站 C 位或者最有梗的位置"]},
  {id:17,dim:"K",text:"朋友之间互相嘴两句时，你更像：",opts:["基本不接这种话题","轻轻回一句","会接梗，也爱补一句","不仅接，还想把场子抬起来"]},
  {id:18,dim:"P",text:"小组作业快翻车时，你更可能：",opts:["直接顶上去，把最脏最累的活接了","跟着大家一起补","先判断哪里最稳，再选择出手时机","等局面比较明朗时再进场，保证自己出手又稳又体面"]},
  {id:19,dim:"D",text:"你对\"状态管理\"更像：",opts:["随缘，困了再说","有心管，但不稳定","大体规律，重要事情前会刻意调整","作息、准备、习惯都很有职业选手味"]},
  {id:20,dim:"G",text:"密室逃脱/团建小游戏里，你更像：",opts:["正面硬冲派","正常玩，正常解","喜欢绕一下、卡别人没想到的点","天生爱走非常规路线，脑回路有点阴但很有效"]},
  {id:21,dim:"S",text:"你发朋友圈/动态时，更像：",opts:["基本不发","发也很低调","偶尔会认真选图选文案","发就要有节目效果，最好大家一眼记住"]},
  {id:22,dim:"K",text:"桌游/开黑输了以后，你通常：",opts:["直接安静复盘","小小吐槽一下","会开始整活、复盘加调侃","又叫又闹，恨不得开一段赛后采访"]},
  {id:23,dim:"P",text:"朋友抢着买单/抢着做事时，你更像：",opts:["第一时间站出来抢","看情况参与","稍微让一让，找更体面的时机","等别人先把最乱的局面处理掉，我再优雅收尾"]},
  {id:24,dim:"D",text:"面对考试/DDL/重要任务，你通常：",opts:["最后爆发，平时不太管","临近了才进入状态","会提前安排，不想临时乱","提前很久就开始控进度，尽量不让自己进极限局"]},
  {id:25,dim:"G",text:"玩狼人杀/推理/阵营游戏时，你更像：",opts:["正面硬聊，不藏","该聊聊，该演演","喜欢藏信息、反打别人逻辑","最享受把别人绕晕，然后自己静静收网"]},
];

// ── 选手原型（10维：E R T M C S K P D G）────────────────────────────
const PLAYERS = [
  {
    name: "zmjjkk",
    desc: "康康·世界冠军破纪录的入场机器。Champions 2024 MVP，Bo5 111 杀历史纪录保持者。Jett / Neon 激进抢一枪，风险与回报并存，是中国区诞生的第一位真正意义上的全球超巨。",
    code: [2,2,1,2,1, 2,2,0,1,1],
  },
  {
    name: "life",
    desc: "EDG 时代的低调哨兵型选手。不追求高光，靠稳定防守和道具价值撑起队伍结构，是少言寡语却不可或缺的那块拼图。",
    code: [2,2,0,2,0, 2,1,0,0,1],
  },
  {
    name: "demon1",
    desc: "NA 最具杀伤力的入场手之一。Champions 2023 MVP，Jett 无畏冲点、追踪式瞄准是噩梦级体验，手感爆发时几乎没有人能正面接住他。",
    code: [2,2,1,2,1, 1,2,0,0,0],
  },
  {
    name: "aspas",
    desc: "被普遍认为是史上最强 Duelist 之一的巴西超人。连续多年稳居全球顶尖，单图 47 杀破纪录，35% 残局胜率，用一己之力把 LATAM 区送上世界舞台。",
    code: [1,0,1,1,2, 0,0,2,2,1],
  },
  {
    name: "Derke",
    desc: "EMEA 最精准的狙击手之一，Operator 操控大师。Fnatic 多年来的第一枪担当，冷静、精确、高产，是欧洲 Duelist 的标杆级人物。",
    code: [1,0,1,2,2, 0,0,1,2,0],
  },
  {
    name: "Boaster",
    desc: "Fnatic 的灵魂指挥官与话题制造机。场上战术创新、残局调整一流；场外梗图主角、赛后采访永远最有节目效果，是 VCT 人气最高的 IGL。",
    code: [0,0,2,1,2, 2,2,0,1,2],
  },
  {
    name: "Chronicle",
    desc: "被誉为史上最强 Sentinel 之一。防守极度冷静，道具架设无懈可击，是 Fnatic 体系能够成立的基石，低调但数据和胜率都会说话。",
    code: [0,0,2,1,2, 0,0,1,2,1],
  },
  {
    name: "TenZ",
    desc: "无畏契约最具文化影响力的选手，没有之一。超凡的机械操作让他成为 VCT 的门面人物，主播、内容创作者、职业选手三位一体，影响力早已超出竞技本身。",
    code: [2,1,2,1,1, 2,0,1,2,0],
  },
  {
    name: "nAts",
    desc: "\"鼠王\"。Team Liquid 的 IGL 兼战术核心，以 Cypher / Viper 游走侧翼、绕后偷袭享誉全球，越是关键局越是冰冷，是等待型战术选手的极致代表。",
    code: [0,0,2,0,2, 1,0,2,2,2],
  },
  {
    name: "Alfajer",
    desc: "Fnatic 最稳定的防守基石，年龄最小却判断最老成的那类选手。哨兵位置无可撼动，读图和站位远超同龄人，是欧洲下一代的定海神针。",
    code: [1,0,2,1,2, 0,0,1,2,0],
  },
  {
    name: "Sayf",
    desc: "攻守均衡的全能型选手，适应性极强。无论打什么 Agent、什么战术体系都能快速融入，是队伍需要弹性时最可靠的那张牌。",
    code: [2,2,0,2,1, 1,1,0,1,0],
  },

const DIMS = ["E","R","T","M","C","S","K","P","D","G"];
const DIM_NAMES = {
  E:"进取性",R:"冒险度",T:"团队服从",M:"击杀风格",C:"抗压",
  S:"存在感",K:"活跃度",P:"出手时机",D:"自律性",G:"策略倾向"
};
// 游戏侧权重 0.6，梗侧 0.4，按每维度归一后加权
const WEIGHTS = [0.6,0.6,0.6,0.6,0.6, 0.4,0.4,0.4,0.4,0.4];

// ── state ─────────────────────────────────────────────────────────────
let order = [], cur = 0;
const ans = new Map();

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// ── score → level (0/1/2) ─────────────────────────────────────────────
// 每个维度有几题：E=3, R=3, T=3, M=3, C=3, S=2, K=2, P=2, D=2, G=2
// 最高分：3题→9分, 2题→6分
// 按比例分三档
function toLevel(score, maxScore){
  if(score <= maxScore/3) return 0;
  if(score <= maxScore*2/3) return 1;
  return 2;
}

const DIM_COUNTS = {E:3,R:3,T:3,M:3,C:3, S:2,K:2,P:2,D:2,G:2};

function calcResults(){
  // 累加各维度原始分
  const raw = {};
  DIMS.forEach(d=>raw[d]=0);
  order.forEach(q=>{
    raw[q.dim] += (ans.get(q.id) ?? 0);
  });
  // 转 level
  const userCode = DIMS.map(d => toLevel(raw[d], DIM_COUNTS[d]*3));

  // 加权曼哈顿距离
  let best = null, bestDist = Infinity;
  PLAYERS.forEach(p=>{
    let dist = 0;
    userCode.forEach((v,i)=> dist += WEIGHTS[i]*Math.abs(v - p.code[i]));
    if(dist < bestDist){bestDist=dist; best=p;}
  });

  // 最大可能距离（每维度最大差2，权重加权）
  const maxDist = WEIGHTS.reduce((s,w)=>s+w*2, 0);
  const pct = Math.round((1 - bestDist/maxDist)*100);

  return {player: best, pct, userCode};
}

// ── render ─────────────────────────────────────────────────────────────
function updateProgress(){
  const n = order.length;
  const answered = Math.min(ans.size, n);
  const p = Math.round((answered / n) * 100);
  document.getElementById('prog-pct').textContent = p+'%';
  document.getElementById('prog-fill').style.width = p+'%';
}

function render(){
  const q = order[cur];
  const n = order.length;

  document.getElementById('prog-txt').textContent = `第 ${cur+1} / ${n} 题`;
  updateProgress();

  document.getElementById('q-num').textContent = 'Q'+(cur+1<10?'0':'')+(cur+1);
  document.getElementById('q-text').textContent = q.text;

  const sel = ans.get(q.id) ?? -1;
  const optsEl = document.getElementById('opts');
  optsEl.innerHTML = q.opts.map((o,i)=>`
    <div class="opt${sel===i?' sel':''}" data-val="${i}">
      <div class="opt-letter">${String.fromCharCode(65+i)}</div>
      <div class="opt-txt">${o}</div>
    </div>
  `).join('');

  optsEl.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',()=>{
      ans.set(q.id, +el.dataset.val);
      optsEl.querySelectorAll('.opt').forEach(e=>e.classList.remove('sel'));
      el.classList.add('sel');
      updateProgress();
    });
  });

  document.getElementById('prev-btn').disabled = cur===0;
  document.getElementById('next-btn').textContent = cur===n-1 ? '查看结果' : '下一题';
}

function showResult(){
  const {player, pct, userCode} = calcResults();

  document.getElementById('q-wrap').style.display='none';
  const progWrap = document.querySelector('.prog-wrap');
  if (progWrap) progWrap.style.opacity = '0.3';

  document.getElementById('res-name').textContent = player.name;
  document.getElementById('res-pct').textContent = pct+'%';
  document.getElementById('res-desc').textContent = player.desc || '';

  // bar animates after paint
  setTimeout(()=>{
    document.getElementById('res-bar').style.width = pct+'%';
  }, 50);

  // dim breakdown
  const dimsEl = document.getElementById('res-dims');
  const lvlLabel = ['低','中','高'];
  dimsEl.innerHTML = DIMS.map((d,i)=>`
    <div class="dim-cell">
      <div class="dim-cell-label">${DIM_NAMES[d]}</div>
      <div class="dim-cell-val">你 <b>${lvlLabel[userCode[i]]}</b> · ${player.name} <b>${lvlLabel[player.code[i]]}</b></div>
    </div>
  `).join('');

  document.getElementById('result').classList.add('show');
  document.getElementById('next-btn').style.display='none';
  document.getElementById('prev-btn').style.display='none';
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function handleNext(){
  const q = order[cur];
  if(!ans.has(q.id)){
    // shake hint
    const wrap = document.getElementById('q-wrap');
    wrap.style.transform='translateX(6px)';
    setTimeout(()=>wrap.style.transform='',200);
    return;
  }
  if(cur === order.length-1){ showResult(); return; }
  const wrap = document.getElementById('q-wrap');
  wrap.classList.add('fade-out');
  setTimeout(()=>{
    cur++;
    render();
    wrap.classList.remove('fade-out');
  },180);
}

function handlePrev(){
  if(cur===0) return;
  const wrap = document.getElementById('q-wrap');
  wrap.classList.add('fade-out');
  setTimeout(()=>{
    cur--;
    render();
    wrap.classList.remove('fade-out');
  },180);
}

function init(){
  order = shuffle(QUESTIONS);
  cur = 0;
  ans.clear();
  document.getElementById('q-wrap').style.display='';
  document.querySelector('.prog-wrap').style.opacity='1';
  document.getElementById('result').classList.remove('show');
  document.getElementById('next-btn').style.display='';
  document.getElementById('prev-btn').style.display='';
  render();
}

document.getElementById('next-btn').addEventListener('click', handleNext);
document.getElementById('prev-btn').addEventListener('click', handlePrev);
document.getElementById('reset-btn').addEventListener('click', init);

init();
</script>
